<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6efe3" />
    <title>rusk | やさしいタスク管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="composer-panel">
        <div class="mobile-topbar">
          <a class="brand" href="index.html" aria-label="rusk ホーム">
            <span class="brand-mark" aria-hidden="true">R</span>
            <span>rusk</span>
          </a>
          <div class="mobile-topbar-actions"><a class="mobile-settings" href="settings.html" aria-label="ルーティン設定">⚙</a><button id="open-composer" class="open-composer" type="button" aria-label="タスクを追加">＋</button></div>
        </div>
        <div class="composer-heading">
          <p class="eyebrow">A LITTLE TASK, A LOVELY DAY</p>
          <h1>今日のひと切れを<br />書きとめよう。</h1>
          <p>やることを小さく並べて、<br />毎日をさくさく進めよう。</p>
        </div>

        <form id="task-form" class="task-form">
          <div class="form-dialog-title"><span>タスクを追加</span><button id="close-composer" type="button" aria-label="閉じる">×</button></div>
          <label class="field-label" for="title">やること</label>
          <input id="title" name="title" type="text" maxlength="60" placeholder="例：企画書を仕上げる" required autocomplete="off" />

          <label class="field-label" for="memo">メモ <span>optional</span></label>
          <textarea id="memo" name="memo" maxlength="160" placeholder="ひとこと残しておこう"></textarea>

          <div>
            <span class="field-label">時間</span>
            <div class="time-row">
              <label><span>開始</span><input id="start-time" name="startTime" type="datetime-local" required /></label>
              <span class="time-dash" aria-hidden="true">〜</span>
              <label><span>終了</span><input id="end-time" name="endTime" type="datetime-local" required /></label>
            </div>
          </div>
          <div>
            <label class="field-label" for="genre">ジャンル</label>
            <select id="genre" name="genre">
              <option value="work">仕事</option>
              <option value="personal">くらし</option>
              <option value="study">学び</option>
              <option value="important">大切なこと</option>
            </select>
          </div>
          <button class="submit-button" type="submit"><span>投稿する</span><span aria-hidden="true">→</span></button>
        </form>
        <p class="calendar-note"><span aria-hidden="true">◌</span> 投稿後、Google カレンダーにも追加できます</p>
        <a class="settings-link" href="settings.html"><span aria-hidden="true">⚙</span> ルーティン設定</a>
      </aside>

      <section class="tasks-panel" id="top">
        <header class="tasks-header">
          <div>
            <p class="eyebrow">MY CRISPY LIST</p>
            <h2>やることリスト</h2>
          </div>
          <a class="header-settings" href="settings.html" aria-label="ルーティン設定">⚙</a>
        </header>

        <section class="list-wrap" aria-labelledby="list-title">
          <nav class="date-navigation" aria-label="実施日を移動">
            <button id="previous-day" type="button" aria-label="前の日">‹</button>
            <div class="date-picker-wrap"><span class="date-select-control"><span class="date-page-label" id="date-page-label" aria-hidden="true"></span><input id="date-picker" type="date" aria-label="移動する日付" /></span></div>
            <div class="date-nav-actions"><button id="today-button" type="button">今日</button><button id="next-day" type="button" aria-label="次の日">›</button></div>
          </nav>
          <div class="bulk-time-shift" aria-label="この日のタスク時間を一括変更">
            <button id="bulk-shift-toggle" class="routine-toggle" type="button" aria-expanded="false" aria-controls="bulk-shift-content">
              <span id="bulk-shift-title">この日のタスクを 前倒し/後倒し</span>
              <span class="routine-chevron" aria-hidden="true">⌄</span>
            </button>
            <div id="bulk-shift-content" class="bulk-time-shift-content" hidden>
              <span>この日のタスクを</span>
              <label><input id="shift-minutes" type="number" min="1" max="1440" step="1" value="15" inputmode="numeric" aria-label="移動する分数" />分</label>
              <div class="bulk-time-shift-actions"><button id="shift-earlier" type="button">前倒し</button><button id="shift-later" type="button">後倒し</button></div>
            </div>
          </div>
          <div class="routine-area" id="routine-area" hidden>
            <button id="routine-toggle" class="routine-toggle" type="button" aria-expanded="false" aria-controls="routine-content">
              <span>毎日のルーティン</span>
              <span class="routine-chevron" aria-hidden="true">⌄</span>
            </button>
            <div id="routine-content" class="routine-content" hidden>
              <div class="routine-filter" role="group" aria-label="ルーティンの時間帯">
                <button type="button" class="routine-filter-button is-active" data-period="morning">朝</button>
                <button type="button" class="routine-filter-button" data-period="daytime">昼</button>
                <button type="button" class="routine-filter-button" data-period="night">夜</button>
                <button type="button" class="routine-filter-button" data-period="other">その他</button>
              </div>
              <div id="routine-list" class="routine-list"></div>
            </div>
          </div>
          <div class="list-heading">
            <div class="section-label"><span id="list-title">保存したタスク</span><span id="task-count">0 ITEMS</span></div>
            <div class="sort-control" role="group" aria-label="タスクの表示順">
              <button type="button" class="sort-button is-active" data-sort="time">時間順</button>
              <button type="button" class="sort-button" data-sort="priority">優先度順</button>
            </div>
          </div>
          <div id="time-filter" class="time-filter" role="group" aria-label="時間帯で絞り込む"><button type="button" class="time-filter-button" data-time-period="am">AM</button><button type="button" class="time-filter-button" data-time-period="pm">PM</button><button type="button" class="time-filter-button is-active" data-time-period="all">すべて</button></div>
          <p class="sort-hint" id="sort-hint">開始時間が早いタスクから表示しています</p>
          <div id="task-list" class="task-list" aria-live="polite"></div>
          <div id="empty-state" class="empty-state">
            <span aria-hidden="true">✦</span>
            <p>まだタスクはありません。<br />左側から最初のひと切れを追加しましょう。</p>
          </div>
        </section>
      </section>
    </main>
    <template id="task-template">
      <article class="task-card saved-card">
        <span class="drag-handle" aria-hidden="true">⠿</span>
        <button class="check-button" type="button" aria-label="完了にする"></button>
        <div class="task-content">
          <div class="card-top"><span class="genre-tag"></span></div>
          <h3></h3><p class="task-memo"></p>
          <button class="task-time-button" type="button" aria-expanded="false" aria-label="実施日時を変更"><span class="task-time-value"></span></button>
          <div class="time-editor" hidden><label>開始日時<input class="edit-start" type="datetime-local" aria-label="開始日時" /></label><span>〜</span><label>終了日時<input class="edit-end" type="datetime-local" aria-label="終了日時" /></label><button class="save-time-button" type="button">時間を変更</button></div>
        </div>
        <div class="task-actions">
          <div class="priority-move" aria-label="優先順位を変更">
            <button class="move-up-button" type="button" aria-label="優先順位を上げる">↑</button>
            <button class="move-down-button" type="button" aria-label="優先順位を下げる">↓</button>
          </div>
          <a class="calendar-button" target="_blank" rel="noopener noreferrer">Google Calendar <span aria-hidden="true">↗</span></a>
          <button class="delete-button" type="button" aria-label="タスクを削除">×</button>
        </div>
      </article>
    </template>
    <script src="script.js"></script>
  </body>
</html>
