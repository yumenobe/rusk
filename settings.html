<!doctype html>
<html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>rusk | ルーティン設定</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css" /><link rel="stylesheet" href="mobile.css" /></head>
<body><main class="settings-shell"><header class="settings-header"><a class="brand" href="index.html"><span class="brand-mark">R</span><span>rusk</span></a><a class="back-link" href="index.html">← タスクへ戻る</a></header><section class="settings-content"><p class="eyebrow">DAILY ROUTINES</p><h1>ルーティン設定</h1><p class="settings-lead">毎日行うことを、書き込まずに追加できるようにしましょう。</p><div class="settings-card"><h2>標準の実施時間</h2><p>通常タスクや、新しく作るルーティンの初期時間です。タスク追加後にも個別で変更できます。</p><div class="default-time-row"><label>開始<input id="default-start" type="time" /></label><span>〜</span><label>終了<input id="default-end" type="time" /></label><button id="save-settings" type="button">保存する</button></div></div><div class="settings-card"><div class="routine-card-heading"><div><h2>毎日のルーティン</h2><p>名称・ジャンル・実施時間を個別に設定できます。</p></div><button id="add-routine" type="button">＋ 追加</button></div><div id="routine-settings" class="routine-settings"></div></div></section></main><script src="settings.js"></script></body></html>
